<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ISM LINE Background</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

    .bg {
      width: 720px; height: 1280px;
      background: #050816;
      position: relative;
      overflow: hidden;
    }

    /* グリッド */
    .bg::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      background-image:
        linear-gradient(rgba(0, 212, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 1;
    }

    /* オーブ群 */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      z-index: 0;
    }

    .orb-1 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(0, 212, 255, 0.35), transparent 70%);
      top: 5%; left: -15%;
    }
    .orb-2 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(124, 77, 255, 0.3), transparent 70%);
      top: 25%; right: -10%;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(0, 255, 163, 0.2), transparent 70%);
      bottom: 30%; left: 10%;
    }
    .orb-4 {
      width: 250px; height: 250px;
      background: radial-gradient(circle, rgba(255, 107, 157, 0.15), transparent 70%);
      bottom: 10%; right: 5%;
    }
    .orb-5 {
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(0, 212, 255, 0.15), transparent 70%);
      top: 55%; left: 50%;
      transform: translateX(-50%);
    }

    /* ISMロゴ（中央下部にさりげなく） */
    .logo {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      text-align: center;
    }

    .logo-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 10px;
      color: rgba(255, 255, 255, 0.08);
    }

    .logo-line {
      width: 50px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.15), transparent);
      margin: 8px auto 0;
    }

    /* 上部にうっすらビジョンテキスト */
    .vision-text {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      letter-spacing: 6px;
      color: rgba(0, 212, 255, 0.12);
      white-space: nowrap;
    }

    /* 装飾ドット */
    .dot {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      z-index: 2;
    }
    .dot-1 { top: 200px; left: 80px; background: rgba(0, 212, 255, 0.2); box-shadow: 0 0 6px rgba(0,212,255,0.3); }
    .dot-2 { top: 400px; right: 120px; background: rgba(124, 77, 255, 0.2); box-shadow: 0 0 6px rgba(124,77,255,0.3); }
    .dot-3 { bottom: 350px; left: 150px; background: rgba(0, 255, 163, 0.2); box-shadow: 0 0 6px rgba(0,255,163,0.3); }
    .dot-4 { top: 600px; right: 80px; background: rgba(0, 212, 255, 0.15); box-shadow: 0 0 6px rgba(0,212,255,0.2); }
    .dot-5 { bottom: 250px; right: 200px; background: rgba(255, 107, 157, 0.15); box-shadow: 0 0 6px rgba(255,107,157,0.2); }

    /* 細い装飾ライン */
    .deco-line {
      position: absolute;
      z-index: 2;
      background: linear-gradient(180deg, transparent, rgba(0, 212, 255, 0.06), transparent);
    }
    .deco-line-1 { width: 1px; height: 200px; top: 150px; left: 100px; }
    .deco-line-2 { width: 1px; height: 150px; bottom: 200px; right: 130px; background: linear-gradient(180deg, transparent, rgba(124, 77, 255, 0.06), transparent); }
  </style>
</head>
<body>

  <div class="bg" id="bgImage">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
    <div class="orb orb-5"></div>

    <div class="dot dot-1"></div>
    <div class="dot dot-2"></div>
    <div class="dot dot-3"></div>
    <div class="dot dot-4"></div>
    <div class="dot dot-5"></div>

    <div class="deco-line deco-line-1"></div>
    <div class="deco-line deco-line-2"></div>

    <div class="vision-text">AI-DRIVEN BUSINESS</div>

    <div class="logo">
      <div class="logo-text">ISM</div>
      <div class="logo-line"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    window.addEventListener('load', () => {
      setTimeout(async () => {
        const el = document.getElementById('bgImage');
        const canvas = await html2canvas(el, {
          width: 720, height: 1280,
          scale: 1,
          backgroundColor: '#050816',
          useCORS: true
        });
        const link = document.createElement('a');
        link.download = 'ISM_LINE_background.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      }, 1000);
    });
  </script>
</body>
</html>
