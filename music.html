<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>is-Ma 全楽曲一覧 | Music Library | I・S・M Records</title>
  <meta name="description" content="is-Ma (Icea × Sylas) 全楽曲ライブラリ。Phase 1 デビュー6曲、Chapter 2 シリーズ、余韻シングルまで。Spotify / Apple Music / YouTube Music / Amazon Music で配信中。">
  <link rel="canonical" href="https://is-ma.pages.dev/music.html">
  <meta property="og:title" content="is-Ma 全楽曲ライブラリ">
  <meta property="og:description" content="Icea × Sylas Dual AI Vocal Project — 全楽曲一覧">
  <meta property="og:image" content="https://is-ma.pages.dev/assets/isma/Icea_Sylas_duo.jpg">
  <meta property="og:url" content="https://is-ma.pages.dev/music.html">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&family=Orbitron:wght@600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg-deep: #04060f;
      --bg-card: rgba(15, 23, 50, 0.7);
      --bg-glass: rgba(10, 15, 36, 0.6);
      --text-primary: #f0f4ff;
      --text-secondary: #8892b0;
      --text-muted: #5a6380;
      --icea: #88d8ff;
      --sylas: #ff5040;
      --accent: #00d4ff;
      --accent-2: #ffc83a;
      --gradient-isma: linear-gradient(135deg, #88d8ff 0%, #ff5040 100%);
      --border: rgba(255,255,255,0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      line-height: 1.7;
    }
    .container { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      backdrop-filter: blur(20px); background: rgba(4,6,15,0.85);
      border-bottom: 1px solid var(--border);
    }
    nav .container {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 1.5rem;
    }
    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem; font-weight: 800;
      background: var(--gradient-isma); -webkit-background-clip: text; background-clip: text;
      color: transparent; letter-spacing: 0.08em;
      text-decoration: none;
    }
    .nav-back {
      color: var(--text-secondary); text-decoration: none; font-size: 0.95rem;
      transition: color 0.3s;
    }
    .nav-back:hover { color: var(--icea); }

    /* PAGE HEADER */
    .page-header {
      padding-top: 120px; padding-bottom: 2rem;
      text-align: center;
      background: radial-gradient(ellipse at top, rgba(136,216,255,0.15) 0%, transparent 60%);
    }
    .section-label {
      display: inline-block; padding: 0.4rem 1rem; border-radius: 50px;
      background: rgba(136,216,255,0.1); border: 1px solid rgba(136,216,255,0.3);
      font-size: 0.8rem; letter-spacing: 0.15em; margin-bottom: 1rem;
      color: var(--icea);
    }
    .page-title {
      font-family: 'Orbitron', sans-serif; font-weight: 800;
      font-size: clamp(2.5rem, 6vw, 4.5rem); line-height: 1.1;
      margin-bottom: 1rem;
      background: var(--gradient-isma); -webkit-background-clip: text; background-clip: text;
      color: transparent;
    }
    .page-desc {
      max-width: 700px; margin: 0 auto;
      color: var(--text-secondary); font-size: 1rem;
    }

    /* FILTERS */
    .filters {
      display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap;
      padding: 2rem 0 1rem;
    }
    .filter-btn {
      padding: 0.5rem 1.2rem; border-radius: 50px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      color: var(--text-secondary); cursor: pointer;
      font-size: 0.9rem; font-weight: 500;
      transition: all 0.3s;
    }
    .filter-btn:hover { color: var(--text-primary); border-color: var(--icea); }
    .filter-btn.active {
      background: var(--gradient-isma); color: white;
      border-color: transparent;
    }

    /* RELEASES GRID */
    .releases-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem; padding: 2rem 0 4rem;
    }
    .release-card {
      padding: 1.5rem; border-radius: 12px;
      background: var(--bg-card); border: 1px solid var(--border);
      position: relative; overflow: hidden;
      transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
    }
    .release-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--gradient-isma);
    }
    .release-card:hover { transform: translateY(-5px); border-color: var(--icea); box-shadow: 0 15px 40px rgba(0,0,0,0.3); }
    .release-card.upcoming::before { background: linear-gradient(135deg, #ffc83a, #ff5040); }
    .release-card.live::before { background: linear-gradient(135deg, #00ff88, #00d4ff); }

    .release-date { margin-bottom: 0.8rem; }
    .release-status {
      display: inline-block; padding: 0.3rem 0.8rem; border-radius: 50px;
      font-size: 0.7rem; letter-spacing: 0.1em; font-weight: 700;
    }
    .release-status.upcoming { background: rgba(255,200,58,0.15); color: var(--accent-2); }
    .release-status.live { background: rgba(0,255,136,0.15); color: #00ff88; }

    .release-debut {
      display: inline-block; padding: 0.25rem 0.7rem; border-radius: 50px;
      font-size: 0.7rem; margin-bottom: 0.5rem; font-weight: 600;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    }
    .release-debut.icea { color: var(--icea); border-color: rgba(136,216,255,0.3); }
    .release-debut.sylas { color: var(--sylas); border-color: rgba(255,80,64,0.3); }
    .release-debut.duo { color: var(--accent-2); border-color: rgba(255,200,58,0.3); }

    .release-title {
      font-family: 'Orbitron', sans-serif; font-weight: 800;
      font-size: 1.5rem; margin: 0.4rem 0 0.1rem;
    }
    .release-title-jp {
      color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 0.6rem;
    }
    .release-vocalist {
      font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.8rem;
    }
    .release-vocalist .v-name { color: var(--text-primary); font-weight: 600; }
    .release-vocalist.icea .v-name { color: var(--icea); }
    .release-vocalist.sylas .v-name { color: var(--sylas); }
    .release-vocalist.duo .v-name {
      background: var(--gradient-isma); -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .release-desc {
      font-size: 0.9rem; color: var(--text-secondary); line-height: 1.6;
      margin-bottom: 1rem;
    }
    .release-preview {
      margin-bottom: 1rem; padding: 0.6rem; border-radius: 8px;
      background: rgba(0,0,0,0.25);
    }
    .release-preview-label {
      display: block; font-size: 0.7rem; letter-spacing: 0.15em;
      color: var(--text-muted); margin-bottom: 0.3rem;
    }
    .release-preview audio { width: 100%; height: 32px; }
    .release-platforms {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
    }
    .release-platforms a {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.4rem 0.8rem; border-radius: 6px;
      background: rgba(255,255,255,0.04); color: var(--text-secondary);
      font-size: 0.78rem; text-decoration: none;
      border: 1px solid var(--border); transition: all 0.3s;
    }
    .release-platforms a:hover { background: var(--icea); color: white; border-color: var(--icea); }

    /* FOOTER */
    footer {
      padding: 3rem 0 2rem; text-align: center;
      border-top: 1px solid var(--border);
      color: var(--text-muted); font-size: 0.85rem;
    }
    footer a { color: var(--text-secondary); text-decoration: none; margin: 0 0.5rem; }
    footer a:hover { color: var(--icea); }
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <a class="logo" href="index.html">is-Ma</a>
      <a class="nav-back" href="index.html">← HPトップに戻る</a>
    </div>
  </nav>

  <header class="page-header">
    <div class="container">
      <span class="section-label">MUSIC LIBRARY</span>
      <h1 class="page-title">is-Ma <span>全楽曲</span></h1>
      <p class="page-desc">
        Icea × Sylas Dual AI Vocal Project — Phase 1 デビュー曲から Chapter 2 シリーズ、余韻シングルまで全リリース。
        全配信プラットフォーム公開中。
      </p>
    </div>
  </header>

  <main class="container">
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="upcoming">Upcoming</button>
      <button class="filter-btn" data-filter="icea">Icea</button>
      <button class="filter-btn" data-filter="sylas">Sylas</button>
      <button class="filter-btn" data-filter="duo">Duo</button>
    </div>

    <div class="releases-grid" id="releases-grid">
      <noscript>JavaScript を有効にしてください。</noscript>
    </div>
  </main>

  <footer>
    <p>© 2026 I・S・M合同会社 · is-Ma (Icea × Sylas) · KOMOREBI 木漏れ日 · Sleeptide · Lofi Bento</p>
    <p style="margin-top: 0.5rem;">
      <a href="index.html">トップへ</a> ·
      <a href="https://open.spotify.com/artist/2XBOJjgZcgcXX0UZva7a2X" target="_blank" rel="noopener">Spotify</a> ·
      <a href="https://music.apple.com/jp/artist/is-ma/1896532584" target="_blank" rel="noopener">Apple Music</a> ·
      <a href="https://music.youtube.com/channel/UCCCxw_WOO7LDpMK7JKs7VhA" target="_blank" rel="noopener">YouTube Music</a> ·
      <a href="https://music.amazon.com/search/is-Ma" target="_blank" rel="noopener">Amazon Music</a>
    </p>
  </footer>

  <script>
    let allSongs = [];
    let currentFilter = 'all';

    async function loadSongs() {
      try {
        const res = await fetch('data/songs.json', { cache: 'no-store' });
        allSongs = await res.json();
        renderGrid();
      } catch (e) {
        document.getElementById('releases-grid').innerHTML =
          '<p style="text-align:center;color:var(--text-muted)">楽曲データの読み込みに失敗しました。</p>';
        console.error(e);
      }
    }

    function renderGrid() {
      const grid = document.getElementById('releases-grid');
      grid.innerHTML = '';
      const songs = allSongs.filter(s => {
        if (currentFilter === 'all') return true;
        if (currentFilter === 'upcoming') return s.status === 'upcoming';
        return s.vocal_class === currentFilter;
      });
      for (const s of songs) {
        const isUpcoming = s.status === 'upcoming';
        const statusHTML = isUpcoming
          ? `<div class="release-date"><span class="release-status upcoming">UPCOMING — ${s.release_date}</span></div>`
          : `<div class="release-date"><span class="release-status live">LIVE NOW</span></div>`;
        const debutHTML = s.debut_badge
          ? `<div class="release-debut ${s.debut_badge_class || ''}">${s.debut_badge}</div>`
          : '';
        const card = document.createElement('div');
        card.className = `release-card ${s.status}`;
        card.innerHTML = `
          ${statusHTML}
          ${debutHTML}
          <div class="release-title">${s.title}</div>
          <div class="release-title-jp">${s.title_jp || ''}</div>
          <div class="release-vocalist ${s.vocal_class || ''}">Vocal: <span class="v-name">${s.vocalist}</span></div>
          <p class="release-desc">${s.description}</p>
          ${s.preview_audio ? `<div class="release-preview"><span class="release-preview-label">30S PREVIEW</span><audio controls preload="none" src="${s.preview_audio}"></audio></div>` : ''}
          <div class="release-platforms">
            <a href="${s.spotify_url || ('https://open.spotify.com/search/' + s.search_slug_url)}" target="_blank" rel="noopener"><i class="fab fa-spotify"></i> Spotify</a>
            <a href="${s.apple_url || ('https://music.apple.com/search?term=' + s.search_slug_plus)}" target="_blank" rel="noopener"><i class="fab fa-apple"></i> Apple Music</a>
            <a href="${s.ytmusic_url || ('https://music.youtube.com/search?q=' + s.search_slug_plus)}" target="_blank" rel="noopener"><i class="fab fa-youtube"></i> YouTube Music</a>
            <a href="${s.amazon_url || ('https://music.amazon.com/search/' + s.search_slug_plus)}" target="_blank" rel="noopener"><i class="fab fa-amazon"></i> Amazon Music</a>
          </div>
        `;
        grid.appendChild(card);
      }
      if (songs.length === 0) {
        grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--text-muted);padding:2rem">該当する楽曲がありません。</p>';
      }
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderGrid();
      });
    });

    loadSongs();
  </script>
</body>
</html>
